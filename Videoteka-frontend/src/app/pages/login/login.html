<p>login works!</p>
<div class="login-wreapper">
    <div class="login-box">
        <h2>Videoteka - Priajava</h2>
        @if (greska) {
            <div class="greska">{{ greska }}</div>
        }
        <div class="form-group">
            <label>Korisničko ime:</label>
            <input type="text" [(ngModel)]="username" placeholder="Unesite korisničko ime">
        </div>
        <div class="form-group">
            <label>Lozinka:</label>
            <input type="password" [(ngModel)]="password" placeholder="Unesite lozinku">
        </div>
        <button (click)="login()">Prijavi se</button>
    </div>
</div>
